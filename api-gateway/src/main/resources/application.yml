server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: event-service
          uri: http://event-service:8081
          predicates:
            - Path=/api/events/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        - id: ticket-service
          uri: http://ticket-service:8084
          predicates:
            - Path=/api/tickets/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000 # 24 horas

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.vivaeventos: DEBUG
    org.springframework.cloud.gateway: INFO
